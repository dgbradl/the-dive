<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200" shape-rendering="crispEdges" font-family="monospace">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <pattern id="brick" width="8" height="4" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#241814"></rect>
      <rect x="0" y="3" width="8" height="1" fill="#0a0604"></rect>
      <rect x="3" y="0" width="1" height="3" fill="#0a0604"></rect>
    </pattern>
  </defs>

  <rect width="220" height="200" fill="#1a1a14"></rect>
  <rect width="220" height="200" fill="url(#brick)" opacity="0.6"></rect>
  <ellipse cx="40" cy="40" rx="30" ry="18" fill="#0a0604" opacity="0.4"></ellipse>
  <ellipse cx="180" cy="160" rx="36" ry="22" fill="#0a0604" opacity="0.35"></ellipse>
  <rect x="14" y="20" width="3" height="3" fill="#1a0f08"></rect>
