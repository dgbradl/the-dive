  <rect x="14" y="177" width="3" height="3" fill="#1a0f08"></rect>
  <rect x="203" y="177" width="3" height="3" fill="#1a0f08"></rect>
  <ellipse cx="110" cy="100" rx="92.39999999999999" ry="64" fill="#c89a3a" opacity="0.10"></ellipse>

  <g filter="url(#glow)">
    <text x="110" y="84" text-anchor="middle" font-size="50" font-weight="900" fill="#f8d8a0" letter-spacing="4">LAST</text>
  </g>
  <text x="110" y="84" text-anchor="middle" font-size="50" font-weight="900" fill="#fff" letter-spacing="4" opacity="0.85">LAST</text>

  <g filter="url(#glow)">
